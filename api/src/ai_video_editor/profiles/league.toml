# League of Legends profile.
#
# Region coordinates are FRACTIONS of the source frame [0,1] and are
# resolution-independent. The values below are reasonable starting
# guesses for a 1920x1080 capture at default HUD scale — calibrate
# them against a real recording before relying on auto-zoom (HUD scale,
# windowed mode, and OBS resolution all shift the layout).
#
# Sounds list the BASENAME of the audio file expected under
#   WORKSPACE/media_library/league/sfx/<file>
# Drop your own .wav files there (or use POST /sfx/extract to cut them
# from a clean reference recording). Missing files warn-and-skip; the
# system never crashes for a missing sound.

[meta]
game = "league"
aliases = ["League of Legends", "League_of_Legends", "League", "lol"]
default_aspect = "16:9"

# ----- Regions -----

[regions.minimap]
x = 0.85
y = 0.72
w = 0.15
h = 0.28
description = "Bottom-right rotation map — ganks, vision, objectives."

[regions.scoreboard]
# Updated 2026-05-27 from real screenshot — modern League HUD moved the
# scoreline + personal KDA to the TOP-RIGHT. Top-center is now reserved
# for objective notifications ("CHANNELING", "BARON SPAWNED", etc.).
# This region covers: team kills · personal K/D/A · CS · game clock.
x = 0.78
y = 0.00
w = 0.20
h = 0.05
description = "Top-right HUD strip: team kills, personal KDA, CS, game clock."

[regions.tab_overlay]
x = 0.10
y = 0.12
w = 0.80
h = 0.70
description = "Held-tab translucent panel — KDA/CS/items reveal moments."

[regions.killfeed]
x = 0.78
y = 0.08
w = 0.22
h = 0.28
description = "Top-right kill announcements. Also drives CV killfeed detection (sprint #5)."

[regions.champion_portrait]
x = 0.16
y = 0.86
w = 0.07
h = 0.14
description = "Bottom-left champion icon + summoner spells."

[regions.item_bar]
x = 0.55
y = 0.88
w = 0.10
h = 0.08
description = "Six item slots + trinket — item-proc moments (Stridebreaker, Zhonyas, GA)."

[regions.hp_mana]
x = 0.30
y = 0.87
w = 0.25
h = 0.05
description = "HP and mana bars under the champion HUD — clutch low-HP escapes."

# ----- Sounds -----

[sounds.first_blood]
file = "first_blood.wav"
description = "Announcer for the opening kill of the game."

[sounds.enemy_slain]
file = "enemy_slain.wav"
description = "Generic enemy-kill announcer (plays on every kill you secure)."

[sounds.ace]
file = "ace.wav"
description = "Announcer when all 5 enemies are dead at once."

[sounds.penta_kill]
file = "penta_kill.wav"
description = "Announcer for a 5-kill streak by one player."

[sounds.baron_slain]
file = "baron_slain.wav"
description = "Baron Nashor objective taken — global power-up cue."

[sounds.buy_item]
file = "buy_item.wav"
description = "Shop purchase sound — pair with item_bar zoom for buy moments."

# ----- Transcription -----
#
# initial_prompt is what faster-whisper sees BEFORE transcribing each
# chunk (combined with condition_on_previous_text=False so the bias
# doesn't decay after the first 30 seconds). Keep it focused on words
# Whisper otherwise mangles (proper nouns, terse jargon). General
# English doesn't need to be biased.
#
# vocabulary feeds the rapidfuzz post-correction pass that snaps
# misrecognized tokens to their nearest known word.

